<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="error-page">
  <div class="card" style="max-width: 500px; padding: var(--spacing-xl) 3rem; text-align: center;">
    <h1 style="font-size: 2rem; margin-bottom: var(--spacing-sm); color: var(--danger-color);">Oops!</h1>
    <p style="font-size: 1.1rem; margin-bottom: var(--spacing-md);">{{ message or "Something went wrong." }}</p>
    <a href="{{ url_for('index') }}" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">← Back to home</a>
  </div>
</body>
</html>
